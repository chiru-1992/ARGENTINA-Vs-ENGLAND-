<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Historical Rivals: Argentina Vs England</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --accent-gold: #ffd700;
            --arg-blue: #74acdf;
            --eng-red: #ff2a2a;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Poppins', sans-serif;
        }

        /* --- VIBRANT ANIMATED BACKGROUND --- */
        body {
            /* Colorful, flowing gradient background */
            background: linear-gradient(-45deg, #ff007f, #4158d0, #00d2ff, #8a2be2);
            background-size: 400% 400%;
            animation: vibrantBG 15s ease infinite;
            color: white;
            min-height: 100vh;
            padding: 20px;
            overflow-x: hidden;
        }

        @keyframes vibrantBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* --- STAGE BANNER --- */
        .stage-banner {
            text-align: center;
            font-size: 22px;
            font-weight: 900;
            letter-spacing: 6px;
            color: #fff;
            background: rgba(0, 0, 0, 0.3);
            padding: 10px 0;
            margin-bottom: 15px;
            text-transform: uppercase;
            border-radius: 15px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.2);
        }

        /* --- HEADER SECTION --- */
        .header {
            text-align: center;
            margin-bottom: 40px;
            padding: 40px 20px;
            background: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 30px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
        }

        .header h1 {
            font-size: 42px; /* Increased Size */
            font-weight: 900;
            letter-spacing: 4px;
            color: var(--accent-gold);
            text-transform: uppercase;
            text-shadow: 0 0 20px rgba(255, 215, 0, 0.6);
        }

        .header h2 {
            font-size: 32px; /* Increased Size */
            margin: 15px 0 30px;
            background: linear-gradient(90deg, #9ccbfa 20%, #ffffff 50%, #ff7373 80%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 4px 10px rgba(0,0,0,0.6));
        }

        .match-details {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 20px;
            font-size: 18px;
            font-weight: 700;
        }

        .match-details span {
            background: rgba(255, 255, 255, 0.15);
            padding: 10px 20px;
            border-radius: 15px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            box-shadow: 0 4px 15px rgba(0,0,0,0.4);
        }

        .pricing {
            margin-top: 30px;
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 15px;
            font-weight: 900;
            font-size: 18px; /* Increased Size */
        }

        .pricing div {
            background: rgba(0, 0, 0, 0.6);
            padding: 12px 24px;
            border-radius: 40px;
            border: 2px solid var(--accent-gold);
            box-shadow: 0 0 15px rgba(255, 215, 0, 0.4);
        }

        /* --- UNLOCK CODE INPUT --- */
        .unlock-container {
            text-align: center;
            margin-bottom: 50px;
            position: sticky;
            top: 20px;
            z-index: 100;
        }

        .code-input {
            padding: 22px 35px;
            font-size: 22px; /* Increased Size */
            font-weight: 900;
            border-radius: 50px;
            border: 3px solid #fff;
            background: rgba(0, 0, 0, 0.8);
            color: white;
            outline: none;
            text-align: center;
            letter-spacing: 4px;
            text-transform: uppercase;
            width: 100%;
            max-width: 400px;
            backdrop-filter: blur(15px);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.6), 0 0 20px rgba(255,255,255,0.4);
            transition: all 0.4s ease;
        }

        .code-input:focus {
            border-color: var(--accent-gold);
            box-shadow: 0 10px 40px rgba(255, 215, 0, 0.6);
        }

        /* --- TICKETS GRID --- */
        .tickets-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 40px; /* Increased gap */
            max-width: 1300px;
            margin: 0 auto;
        }

        @media(min-width: 850px) {
            .tickets-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        /* --- PREMIUM TICKET DESIGN (Massively Scaled Up) --- */
        .ticket {
            position: relative;
            background: rgba(0, 0, 0, 0.4); /* Darker glass to stand out against bright bg */
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 3px solid rgba(255, 255, 255, 0.4);
            border-radius: 35px;
            overflow: hidden;
            box-shadow: 0 20px 45px rgba(0, 0, 0, 0.6);
            display: flex;
            flex-direction: column;
            min-height: 340px; /* Much larger height */
        }

        .ticket-header {
            text-align: center;
            background: rgba(0, 0, 0, 0.6);
            padding: 20px;
            font-weight: 900;
            letter-spacing: 3px;
            font-size: 22px; /* Increased Size */
            border-bottom: 3px solid rgba(255, 255, 255, 0.2);
            color: var(--accent-gold);
            text-shadow: 0 4px 8px rgba(0,0,0,0.8);
        }

        .ticket-body {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 35px 20px;
            position: relative;
            flex-grow: 1;
        }

        /* --- SPLIT NATIONAL FLAGS AS BACKGROUNDS --- */
        .ticket-bg-flag {
            position: absolute;
            top: 0;
            bottom: 0;
            width: 50%;
            opacity: 0.25; /* Slightly more visible flags */
            pointer-events: none;
            z-index: 1;
            background-size: cover;
            background-position: center;
            filter: saturate(1.5);
        }

        .flag-left {
            left: 0;
            background-image: linear-gradient(to bottom, #74acdf 30%, #fff 30%, #fff 70%, #74acdf 70%);
        }

        .flag-right {
            right: 0;
            background: 
                linear-gradient(to right, transparent 44%, #ff2a2a 44%, #ff2a2a 56%, transparent 56%),
                linear-gradient(to bottom, #fff 40%, #ff2a2a 40%, #ff2a2a 60%, #fff 60%);
        }

        .player-card {
            text-align: center;
            width: 45%;
            z-index: 2;
        }

        .country-label {
            font-size: 18px; /* Increased Size */
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 15px;
            text-shadow: 0 4px 8px rgba(0,0,0,0.9);
        }

        .arg-label { color: #b3d9ff; }
        .eng-label { color: #ff8080; }

        .player-photo {
            width: 140px; /* HUGE PHOTO */
            height: 140px;
            border-radius: 50%;
            object-fit: cover;
            margin-bottom: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.8);
            background-color: #151a28;
        }
        
        .ticket:nth-child(odd) .player-photo { border: 4px solid var(--arg-blue); }
        .ticket:nth-child(even) .player-photo { border: 4px solid var(--eng-red); }

        .player-name {
            font-size: 20px; /* Increased Size */
            font-weight: 800;
            margin-bottom: 8px;
            line-height: 1.2;
            text-shadow: 0 3px 6px rgba(0,0,0,1);
        }

        .player-number {
            font-size: 32px; /* Increased Size */
            font-weight: 900;
            color: var(--accent-gold);
            text-shadow: 0 4px 10px rgba(0,0,0,1);
        }

        .vs-badge {
            font-size: 36px; /* Increased Size */
            font-weight: 900;
            font-style: italic;
            color: rgba(255,255,255,0.9);
            z-index: 2;
            text-shadow: 0 0 20px rgba(0,0,0,0.8);
        }

        /* --- LOCK OVERLAY --- */
        .lock-overlay {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0, 0, 0, 0.85); /* Solid dark overlay to hide ticket before unlock */
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 10;
            transition: opacity 4s cubic-bezier(0.4, 0, 0.2, 1), 
                        backdrop-filter 4s ease, 
                        transform 4s ease;
            transform: scale(1);
        }

        .lock-icon {
            font-size: 60px; /* Increased Size */
            margin-bottom: 15px;
            filter: drop-shadow(0 0 15px rgba(255,215,0,0.6));
            animation: pulse 2s infinite alternate;
        }

        .lock-text {
            font-weight: 900;
            letter-spacing: 5px;
            color: var(--accent-gold);
            font-size: 20px; /* Increased Size */
            text-shadow: 0 4px 8px rgba(0,0,0,0.8);
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            100% { transform: scale(1.15); }
        }

        .unlocked .lock-overlay {
            opacity: 0;
            transform: scale(1.05);
            pointer-events: none;
        }
    </style>
</head>
<body>

    <!-- SEMI FINAL Banner -->
    <div class="stage-banner">SEMI FINAL</div>

    <!-- Header -->
    <div class="header">
        <h1>HISTORICAL RIVALS</h1>
        <h2>ARGENTINA Vs ENGLAND</h2>
        <div class="match-details">
            <span>📅 16th July</span>
            <span>⏰ 12:30</span>
        </div>
        <div class="pricing">
            <div>🎟️ Ticket: $100</div>
            <div>⚽ 1st Goal: $1200</div>
            <div>⚽ 2nd Goal: $600</div>
            <div>⚽ 3rd Goal: $200</div>
        </div>
    </div>

    <!-- Code Input Section -->
    <div class="unlock-container">
        <input type="text" id="masterCode" class="code-input" placeholder="ENTER SECRET CODE" autocomplete="off">
    </div>

    <!-- Tickets Container -->
    <div class="tickets-grid" id="ticketsGrid">
        <!-- Dynamic content generated by JavaScript -->
    </div>

    <script>
        const matchData = [
            { arg: { name: "Lionel Messi", num: 10, img: "lionel_messi.jpg" }, eng: { name: "John Stones", num: 5, img: "john_stones.jpg" } },
            { arg: { name: "Julián Álvarez", num: 9, img: "julian_alvarez.jpg" }, eng: { name: "Marc Guéhi", num: 6, img: "marc_guehi.jpg" } },
            { arg: { name: "Lautaro Martínez", num: 22, img: "lautaro_martinez.jpg" }, eng: { name: "Ezri Konsa", num: 2, img: "ezri_konsa.jpg" } },
            { arg: { name: "Thiago Almada", num: 16, img: "thiayo_almada.jpg" }, eng: { name: "Reece James", num: 24, img: "reece_james.jpg" } },
            { arg: { name: "Giuliano Simeone", num: 17, img: "giuliano_simeone.jpg" }, eng: { name: "Dan Burn", num: 15, img: "dan_burn.jpg" } },
            { arg: { name: "Nico Paz", num: 18, img: "nico_paz.jpg" }, eng: { name: "Trevoh Chalobah", num: 12, img: "trevah_chalobah.jpg" } },
            { arg: { name: "José Manuel López", num: 21, img: "jose_manual_lopez.jpg" }, eng: { name: "Jarell Quansah", num: 26, img: "jarell_quansah.jpg" } },
            { arg: { name: "Nico González", num: 15, img: "nico_gonzalez.jpg" }, eng: { name: "Djed Spence", num: 25, img: "djed_spence.jpg" } },
            { arg: { name: "Alexis Mac Allister", num: 20, img: "alexis_mac_allister.jpg" }, eng: { name: "Nico O'Reilly", num: 3, img: "nico_oreilly.jpg" } },
            { arg: { name: "Giovani Lo Celso", num: 11, img: "giovani_lo_celso.jpg" }, eng: { name: "Declan Rice", num: 4, img: "declan_rice.jpg" } },
            { arg: { name: "Rodrigo De Paul", num: 7, img: "rodrigo_de_paul.jpg" }, eng: { name: "Jordan Henderson", num: 14, img: "jordon_henderson.jpg" } },
            { arg: { name: "Exequiel Palacios", num: 14, img: "exequiel_palacios.jpg" }, eng: { name: "Kobbie Mainoo", num: 16, img: "kobbie_mainoo.jpg" } },
            { arg: { name: "Marcos Senesi", num: 2, img: "marcos_senesi.jpg" }, eng: { name: "Harry Kane", num: 9, img: "harry_kane.jpg" } },
            { arg: { name: "Nicolás Tagliafico", num: 3, img: "nicolas_tagliafico.jpg" }, eng: { name: "Bukayo Saka", num: 7, img: "bukayo_saka.jpg" } },
            { arg: { name: "Gonzalo Montiel", num: 4, img: "gonzalo_montiel.jpg" }, eng: { name: "Marcus Rashford", num: 11, img: "marcus_rashford.jpg" } },
            { arg: { name: "Lisandro Martínez", num: 6, img: "lisandro_martinez.jpg" }, eng: { name: "Anthony Gordon", num: 18, img: "anthony_gordon.jpg" } },
            { arg: { name: "Cristian Romero", num: 13, img: "cristian_romero.jpg" }, eng: { name: "Ollie Watkins", num: 19, img: "ollie_watkins.jpg" } },
            { arg: { name: "Nicolás Otamendi", num: 19, img: "nicolas_otamendi.jpg" }, eng: { name: "Noni Madueke", num: 20, img: "noni_madueke.jpg" } },
            { arg: { name: "Facundo Medina", num: 25, img: "facundo_medina.jpg" }, eng: { name: "Ivan Toney", num: 22, img: "ivan_toney.jpg" } },
            { arg: { name: "Nahuel Molina", num: 26, img: "nahuel_molina.jpg" }, eng: { name: "Jude Bellingham", num: 10, img: "jude_bellingham.jpg" } },
            { arg: { name: "Enzo Fernández", num: 24, img: "enzo_fernandez.jpg" }, eng: { name: "Eberechi Eze", num: 21, img: "eberechi_eze.jpg" } },
            { arg: { name: "Leandro Paredes", num: 5, img: "leandro_paredes.jpg" }, eng: { name: "Morgan Rogers", num: 17, img: "morgon_rogers.jpg" } },
            { arg: { name: "Valentin Barco", num: 8, img: "valentina_barco.jpg" }, eng: { name: "Elliot Anderson", num: 8, img: "elliot_anderson.jpg" } }
        ];

        const grid = document.getElementById('ticketsGrid');

        matchData.forEach((match, index) => {
            const ticketHTML = `
                <div class="ticket" id="ticket-${index}">
                    <div class="ticket-header">✨ CHAMPIONS TICKET #${(index + 1).toString().padStart(2, '0')} ✨</div>
                    
                    <div class="lock-overlay">
                        <div class="lock-icon">🔒</div>
                        <div class="lock-text">TAP CODE TO DISSOLVE</div>
                    </div>

                    <div class="ticket-body">
                        <div class="ticket-bg-flag flag-left"></div>
                        <div class="ticket-bg-flag flag-right"></div>

                        <div class="player-card">
                            <div class="country-label arg-label">ARGENTINA</div>
                            <img src="Argentina/${match.arg.img}" alt="${match.arg.name}" class="player-photo" onerror="this.src='https://via.placeholder.com/140/74acdf/ffffff?text=${match.arg.num}'">
                            <div class="player-name">${match.arg.name}</div>
                            <div class="player-number">#${match.arg.num}</div>
                        </div>

                        <div class="vs-badge">VS</div>

                        <div class="player-card">
                            <div class="country-label eng-label">ENGLAND</div>
                            <img src="England/${match.eng.img}" alt="${match.eng.name}" class="player-photo" onerror="this.src='https://via.placeholder.com/140/ff2a2a/ffffff?text=${match.eng.num}'">
                            <div class="player-name">${match.eng.name}</div>
                            <div class="player-number">#${match.eng.num}</div>
                        </div>
                    </div>
                </div>
            `;
            grid.innerHTML += ticketHTML;
        });

        const inputField = document.getElementById('masterCode');
        
        inputField.addEventListener('input', function() {
            if (this.value.toUpperCase().trim() === 'HAND OF GOD') {
                this.style.borderColor = '#4CAF50';
                this.style.color = '#4CAF50';
                this.style.background = 'rgba(0, 0, 0, 0.9)';
                this.style.boxShadow = '0 0 30px rgba(76, 175, 80, 0.8)';
                this.disabled = true;

                const tickets = document.querySelectorAll('.ticket');
                tickets.forEach((ticket, index) => {
                    setTimeout(() => {
                        ticket.classList.add('unlocked');
                    }, index * 750); 
                });
            }
        });
    </script>
</body>
</html>
