<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Historical Rivals: Argentina Vs England</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #050811;
            --accent-gold: #ffd700;
            --arg-blue: #74acdf;
            --eng-red: #ff2a2a;
            
            /* High-vibrancy gradients for a premium feel */
            --arg-gradient: linear-gradient(135deg, rgba(116, 172, 223, 0.25), rgba(255, 255, 255, 0.1));
            --eng-gradient: linear-gradient(135deg, rgba(255, 42, 42, 0.2), rgba(255, 255, 255, 0.1));
            --ticket-neon: linear-gradient(90deg, #74acdf, #ff2a2a);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Poppins', sans-serif;
        }

        body {
            background-color: var(--bg-color);
            background-image: 
                radial-gradient(circle at 10% 20%, rgba(116, 172, 223, 0.2) 0%, transparent 40%),
                radial-gradient(circle at 90% 80%, rgba(255, 42, 42, 0.2) 0%, transparent 40%);
            color: white;
            min-height: 100vh;
            padding: 20px;
            overflow-x: hidden;
        }

        /* --- STAGE BANNER --- */
        .stage-banner {
            text-align: center;
            font-size: 18px;
            font-weight: 900;
            letter-spacing: 6px;
            color: #fff;
            background: linear-gradient(90deg, transparent, var(--eng-red), var(--arg-blue), transparent);
            padding: 6px 0;
            margin-bottom: 10px;
            text-transform: uppercase;
            text-shadow: 0 0 10px rgba(255,255,255,0.5);
        }

        /* --- HEADER SECTION --- */
        .header {
            text-align: center;
            margin-bottom: 35px;
            padding: 35px 20px;
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 2px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.6), 
                        inset 0 0 20px rgba(116, 172, 223, 0.2);
        }

        .header h1 {
            font-size: 36px;
            font-weight: 900;
            letter-spacing: 4px;
            color: var(--accent-gold);
            text-transform: uppercase;
            text-shadow: 0 0 15px rgba(255, 215, 0, 0.4);
        }

        .header h2 {
            font-size: 28px;
            margin: 10px 0 25px;
            background: linear-gradient(90deg, #74acdf 40%, #ffffff 50%, #ff2a2a 60%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 2px 8px rgba(0,0,0,0.5));
        }

        .match-details {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 15px;
            font-size: 15px;
            font-weight: 700;
        }

        .match-details span {
            background: rgba(255, 255, 255, 0.07);
            padding: 8px 16px;
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.15);
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }

        .pricing {
            margin-top: 25px;
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 15px;
            font-weight: 700;
            font-size: 15px;
        }

        .pricing div {
            background: rgba(0, 0, 0, 0.4);
            padding: 8px 16px;
            border-radius: 30px;
            border: 1px solid var(--accent-gold);
            box-shadow: 0 0 10px rgba(255, 215, 0, 0.2);
        }

        /* --- UNLOCK CODE INPUT --- */
        .unlock-container {
            text-align: center;
            margin-bottom: 45px;
            position: sticky;
            top: 15px;
            z-index: 100;
        }

        .code-input {
            padding: 18px 30px;
            font-size: 18px;
            font-weight: 700;
            border-radius: 40px;
            border: 2px solid #fff;
            background: linear-gradient(135deg, rgba(11, 15, 25, 0.9), rgba(30, 40, 60, 0.9));
            color: white;
            outline: none;
            text-align: center;
            letter-spacing: 3px;
            text-transform: uppercase;
            width: 100%;
            max-width: 340px;
            backdrop-filter: blur(10px);
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.5), 0 0 15px rgba(255,255,255,0.2);
            transition: all 0.4s ease;
        }

        .code-input:focus {
            border-color: var(--accent-gold);
            box-shadow: 0 8px 30px rgba(255, 215, 0, 0.4);
        }

        /* --- TICKETS GRID (Increased Size) --- */
        .tickets-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 30px;
            max-width: 1300px;
            margin: 0 auto;
        }

        @media(min-width: 850px) {
            .tickets-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        /* --- PREMIUM TICKET DESIGN --- */
        .ticket {
            position: relative;
            background: rgba(255, 255, 255, 0.02);
            border: 2px solid rgba(255, 255, 255, 0.08);
            border-radius: 28px;
            overflow: hidden;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.4);
            display: flex;
            flex-direction: column;
            min-height: 240px; /* Increased height */
            transition: transform 0.3s;
        }

        .ticket:hover {
            transform: translateY(-5px);
        }

        .ticket-header {
            text-align: center;
            background: linear-gradient(90deg, rgba(116, 172, 223, 0.3), rgba(255, 42, 42, 0.3));
            padding: 14px;
            font-weight: 700;
            letter-spacing: 2px;
            font-size: 16px;
            border-bottom: 2px solid rgba(255, 255, 255, 0.1);
            color: #fff;
            text-shadow: 0 2px 4px rgba(0,0,0,0.5);
        }

        .ticket-body {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 25px 30px;
            position: relative;
            flex-grow: 1;
            background: linear-gradient(90deg, rgba(116,172,223,0.05) 0%, rgba(255,42,42,0.05) 100%);
        }

        /* --- SPLIT NATIONAL FLAGS AS BACKGROUNDS --- */
        .ticket-bg-flag {
            position: absolute;
            top: 0;
            bottom: 0;
            width: 50%;
            opacity: 0.12; /* Subtle flag integration */
            pointer-events: none;
            z-index: 1;
            background-size: cover;
            background-position: center;
            filter: saturate(1.5) blur(1px);
        }

        .flag-left {
            left: 0;
            /* Simple CSS representation of the Argentina Sun/Stripes flag layout */
            background-image: linear-gradient(to bottom, #74acdf 30%, #fff 30%, #fff 70%, #74acdf 70%);
        }

        .flag-right {
            right: 0;
            /* Simple CSS representation of the England St. George's Cross */
            background: 
                linear-gradient(to right, transparent 44%, #ff2a2a 44%, #ff2a2a 56%, transparent 56%),
                linear-gradient(to bottom, #fff 40%, #ff2a2a 40%, #ff2a2a 60%, #fff 60%);
        }

        .player-card {
            text-align: center;
            width: 45%;
            z-index: 2; /* Sits completely above the background flags */
        }

        .country-label {
            font-size: 14px;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 12px;
            text-shadow: 0 2px 4px rgba(0,0,0,0.8);
        }

        .arg-label { color: #9ccbfa; }
        .eng-label { color: #ff5c5c; }

        .player-photo {
            width: 105px; /* Increased photo size */
            height: 105px;
            border-radius: 50%;
            object-fit: cover;
            margin-bottom: 12px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.6);
            background-color: #151a28;
            transition: all 0.5s ease;
        }
        
        .ticket:nth-child(odd) .player-photo { border: 3px solid var(--arg-blue); }
        .ticket:nth-child(even) .player-photo { border: 3px solid var(--eng-red); }

        .player-name {
            font-size: 15px;
            font-weight: 700;
            margin-bottom: 6px;
            line-height: 1.3;
            text-shadow: 0 2px 4px rgba(0,0,0,0.8);
        }

        .player-number {
            font-size: 22px;
            font-weight: 900;
            color: var(--accent-gold);
            text-shadow: 0 2px 5px rgba(0,0,0,0.9);
        }

        .vs-badge {
            font-size: 24px;
            font-weight: 900;
            font-style: italic;
            color: rgba(255,255,255,0.25);
            z-index: 2;
            text-shadow: 0 0 10px rgba(0,0,0,0.5);
        }

        /* --- LOCK OVERLAY --- */
        .lock-overlay {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: radial-gradient(circle at center, #131a2e 20%, #070b14 100%);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 10;
            /* CRITICAL CHANGE: Slow, smooth dilution transformation */
            transition: opacity 3.5s cubic-bezier(0.4, 0, 0.2, 1), 
                        backdrop-filter 3.5s ease, 
                        transform 3.5s ease;
            transform: scale(1);
        }

        .lock-icon {
            font-size: 48px;
            margin-bottom: 12px;
            filter: drop-shadow(0 0 10px rgba(255,215,0,0.4));
            animation: pulse 2s infinite alternate;
        }

        .lock-text {
            font-weight: 700;
            letter-spacing: 4px;
            color: var(--accent-gold);
            font-size: 15px;
            text-shadow: 0 2px 4px rgba(0,0,0,0.5);
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            100% { transform: scale(1.1); }
        }

        /* Dilute / Dissolve effect applied slowly */
        .unlocked .lock-overlay {
            opacity: 0;
            transform: scale(1.08);
            pointer-events: none;
        }
    </style>
</head>
<body>

    <!-- SEMI FINAL Banner -->
    <div class="stage-banner">SEMI FINAL</div>

    <!-- Header -->
    <div class="header">
        <h1>HISTORICAL RIVALS</h1>
        <h2>ARGENTINA Vs ENGLAND</h2>
        <div class="match-details">
            <span>📅 16th July</span>
            <span>⏰ 12:30</span>
        </div>
        <div class="pricing">
            <div>🎟️ Ticket: $100</div>
            <div>⚽ 1st Goal: $1200</div>
            <div>⚽ 2nd Goal: $600</div>
            <div>⚽ 3rd Goal: $200</div>
        </div>
    </div>

    <!-- Code Input Section -->
    <div class="unlock-container">
        <input type="text" id="masterCode" class="code-input" placeholder="ENTER SECRET CODE" autocomplete="off">
    </div>

    <!-- Tickets Container -->
    <div class="tickets-grid" id="ticketsGrid">
        <!-- Dynamic content generated by JavaScript -->
    </div>

    <script>
        // Exact filename matching from repository images
        const matchData = [
            { arg: { name: "Lionel Messi", num: 10, img: "lionel_messi.jpg" }, eng: { name: "John Stones", num: 5, img: "john_stones.jpg" } },
            { arg: { name: "Julián Álvarez", num: 9, img: "julian_alvarez.jpg" }, eng: { name: "Marc Guéhi", num: 6, img: "marc_guehi.jpg" } },
            { arg: { name: "Lautaro Martínez", num: 22, img: "lautaro_martinez.jpg" }, eng: { name: "Ezri Konsa", num: 2, img: "ezri_konsa.jpg" } },
            { arg: { name: "Thiago Almada", num: 16, img: "thiayo_almada.jpg" }, eng: { name: "Reece James", num: 24, img: "reece_james.jpg" } },
            { arg: { name: "Giuliano Simeone", num: 17, img: "giuliano_simeone.jpg" }, eng: { name: "Dan Burn", num: 15, img: "dan_burn.jpg" } },
            { arg: { name: "Nico Paz", num: 18, img: "nico_paz.jpg" }, eng: { name: "Trevoh Chalobah", num: 12, img: "trevah_chalobah.jpg" } },
            { arg: { name: "José Manuel López", num: 21, img: "jose_manual_lopez.jpg" }, eng: { name: "Jarell Quansah", num: 26, img: "jarell_quansah.jpg" } },
            { arg: { name: "Nico González", num: 15, img: "nico_gonzalez.jpg" }, eng: { name: "Djed Spence", num: 25, img: "djed_spence.jpg" } },
            { arg: { name: "Alexis Mac Allister", num: 20, img: "alexis_mac_allister.jpg" }, eng: { name: "Nico O'Reilly", num: 3, img: "nico_oreilly.jpg" } },
            { arg: { name: "Giovani Lo Celso", num: 11, img: "giovani_lo_celso.jpg" }, eng: { name: "Declan Rice", num: 4, img: "declan_rice.jpg" } },
            { arg: { name: "Rodrigo De Paul", num: 7, img: "rodrigo_de_paul.jpg" }, eng: { name: "Jordan Henderson", num: 14, img: "jordon_henderson.jpg" } },
            { arg: { name: "Exequiel Palacios", num: 14, img: "exequiel_palacios.jpg" }, eng: { name: "Kobbie Mainoo", num: 16, img: "kobbie_mainoo.jpg" } },
            { arg: { name: "Marcos Senesi", num: 2, img: "marcos_senesi.jpg" }, eng: { name: "Harry Kane", num: 9, img: "harry_kane.jpg" } },
            { arg: { name: "Nicolás Tagliafico", num: 3, img: "nicolas_tagliafico.jpg" }, eng: { name: "Bukayo Saka", num: 7, img: "bukayo_saka.jpg" } },
            { arg: { name: "Gonzalo Montiel", num: 4, img: "gonzalo_montiel.jpg" }, eng: { name: "Marcus Rashford", num: 11, img: "marcus_rashford.jpg" } },
            { arg: { name: "Lisandro Martínez", num: 6, img: "lisandro_martinez.jpg" }, eng: { name: "Anthony Gordon", num: 18, img: "anthony_gordon.jpg" } },
            { arg: { name: "Cristian Romero", num: 13, img: "cristian_romero.jpg" }, eng: { name: "Ollie Watkins", num: 19, img: "ollie_watkins.jpg" } },
            { arg: { name: "Nicolás Otamendi", num: 19, img: "nicolas_otamendi.jpg" }, eng: { name: "Noni Madueke", num: 20, img: "noni_madueke.jpg" } },
            { arg: { name: "Facundo Medina", num: 25, img: "facundo_medina.jpg" }, eng: { name: "Ivan Toney", num: 22, img: "ivan_toney.jpg" } },
            { arg: { name: "Nahuel Molina", num: 26, img: "nahuel_molina.jpg" }, eng: { name: "Jude Bellingham", num: 10, img: "jude_bellingham.jpg" } },
            { arg: { name: "Enzo Fernández", num: 24, img: "enzo_fernandez.jpg" }, eng: { name: "Eberechi Eze", num: 21, img: "eberechi_eze.jpg" } },
            { arg: { name: "Leandro Paredes", num: 5, img: "leandro_paredes.jpg" }, eng: { name: "Morgan Rogers", num: 17, img: "morgon_rogers.jpg" } },
            { arg: { name: "Valentin Barco", num: 8, img: "valentina_barco.jpg" }, eng: { name: "Elliot Anderson", num: 8, img: "elliot_anderson.jpg" } }
        ];

        const grid = document.getElementById('ticketsGrid');

        // Dynamically build larger, colorful tickets with nested background flags
        matchData.forEach((match, index) => {
            const ticketHTML = `
                <div class="ticket" id="ticket-${index}">
                    <div class="ticket-header">✨ CHAMPIONS TICKET #${(index + 1).toString().padStart(2, '0')} ✨</div>
                    
                    <div class="lock-overlay">
                        <div class="lock-icon">🔒</div>
                        <div class="lock-text">TAP CODE TO DISSOLVE</div>
                    </div>

                    <div class="ticket-body">
                        <!-- Split Flag Backgrounds inside the body -->
                        <div class="ticket-bg-flag flag-left"></div>
                        <div class="ticket-bg-flag flag-right"></div>

                        <!-- Argentina -->
                        <div class="player-card">
                            <div class="country-label arg-label">ARGENTINA</div>
                            <img src="Argentina/${match.arg.img}" alt="${match.arg.name}" class="player-photo" onerror="this.src='https://via.placeholder.com/105/74acdf/ffffff?text=${match.arg.num}'">
                            <div class="player-name">${match.arg.name}</div>
                            <div class="player-number">#${match.arg.num}</div>
                        </div>

                        <div class="vs-badge">VS</div>

                        <!-- England -->
                        <div class="player-card">
                            <div class="country-label eng-label">ENGLAND</div>
                            <img src="England/${match.eng.img}" alt="${match.eng.name}" class="player-photo" onerror="this.src='https://via.placeholder.com/105/ff2a2a/ffffff?text=${match.eng.num}'">
                            <div class="player-name">${match.eng.name}</div>
                            <div class="player-number">#${match.eng.num}</div>
                        </div>
                    </div>
                </div>
            `;
            grid.innerHTML += ticketHTML;
        });

        // Slow sequential dilution interaction logic
        const inputField = document.getElementById('masterCode');
        
        inputField.addEventListener('input', function() {
            if (this.value.toUpperCase().trim() === 'HAND OF GOD') {
                this.style.borderColor = '#4CAF50';
                this.style.color = '#4CAF50';
                this.style.boxShadow = '0 0 20px rgba(76, 175, 80, 0.6)';
                this.disabled = true;

                const tickets = document.querySelectorAll('.ticket');
                tickets.forEach((ticket, index) => {
                    // Increased delay interval to 750ms so you can watch them dilute slowly down the screen
                    setTimeout(() => {
                        ticket.classList.add('unlocked');
                    }, index * 750); 
                });
            }
        });
    </script>
</body>
</html>
